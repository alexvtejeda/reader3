<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="icon" type="image/png" href="/static/images/stack-of-books.png">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/library.css">
    {% include "_theme_init.html" %}
</head>
<body>
    <div class="container">
        <div class="library-header">
            <h1>Library</h1>
            <button class="theme-toggle" type="button" aria-label="Toggle theme"></button>
        </div>

        {% if not books %}
            <p>No processed books found. Run <code>reader3.py</code> on an epub first.</p>
        {% endif %}

        <div class="book-grid">
            {% for book in books %}
            <div class="book-card">
                <div class="book-title">{{ book.title }}</div>
                <div class="book-meta">
                    {{ book.author }}<br>
                    {{ book.chapters }} sections
                </div>
                <a href="/read/{{ book.id }}/0" class="btn">Read Book</a>
            </div>
            {% endfor %}
        </div>
    </div>
    <script src="/static/js/theme.js"></script>
</body>
</html>
